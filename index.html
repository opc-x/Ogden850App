<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#2f7d4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function () {
        var doc = document.documentElement;
        function isStandalone() {
          return window.navigator.standalone === true
            || window.matchMedia('(display-mode: standalone)').matches
            || window.matchMedia('(display-mode: fullscreen)').matches;
        }
        function apply() {
          if (!isStandalone()) return;
          doc.classList.add('pwa-standalone');
          var vv = window.visualViewport;
          var h = Math.max(window.innerHeight, vv && vv.height ? vv.height : 0);
          doc.style.setProperty('--app-height', Math.round(h) + 'px');
        }
        apply();
        window.addEventListener('resize', apply);
        window.addEventListener('pageshow', apply);
        window.addEventListener('orientationchange', function () { setTimeout(apply, 150); });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', apply);
        }
      })();
    </script>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Charis+SIL:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Pacifico&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Ogden 850 Basic English</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
